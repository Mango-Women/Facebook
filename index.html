<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mangoes Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sacramento&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.min.js"></script>
    <style>
        :root{--primary:#1877F2;--primary-hover:#166FE5;--primary-light:#E7F3FF;--bg:#F0F2F5;--card:#FFFFFF;--text-primary:#1C1E21;--text-secondary:#606770;--text-light:#8A8D91;--border:#E4E6EB;--hover-bg:#F0F2F5;--danger:#E41E3F;--success:#31A24C;--shadow:0 1px 2px rgba(0,0,0,.1);--shadow-md:0 2px 8px rgba(0,0,0,.12);--shadow-lg:0 4px 16px rgba(0,0,0,.16);--radius:8px;--radius-lg:12px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text-primary);min-height:100vh;font-size:15px;line-height:1.5;-webkit-tap-highlight-color:transparent}
        img{display:block}

        .header{background:var(--card);box-shadow:var(--shadow);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:52px}
        .header-brand{font-family:'Sacramento',cursive;font-size:30px;color:var(--primary);font-weight:700;line-height:1;cursor:default;user-select:none}
        .header-right{display:flex;gap:4px;align-items:center}
        .icon-btn{width:38px;height:38px;border-radius:50%;background:var(--hover-bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:17px;transition:background .15s,transform .1s}
        .icon-btn:hover{background:var(--border)}
        .icon-btn:active{transform:scale(.93)}

        .app-wrap{max-width:680px;margin:0 auto;padding:12px 8px 80px}
        .card{background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}

        .profile-cover{height:100px;background:linear-gradient(135deg,#1877F2 0%,#42A5F5 60%,#90CAF9 100%)}
        .profile-body{text-align:center;padding:0 16px 14px;position:relative}
        .profile-dp{width:84px;height:84px;border-radius:50%;object-fit:cover;border:3px solid var(--card);margin:-42px auto 0;position:relative;z-index:1;background:var(--border)}
        .profile-name{font-size:20px;font-weight:700;margin-top:6px}
        .profile-bio{color:var(--text-secondary);font-size:13px;margin-top:2px}
        .profile-btns{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap}

        .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;transition:background .15s,transform .1s;white-space:nowrap}
        .btn:active{transform:scale(.96)}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:var(--primary-hover)}
        .btn-secondary{background:var(--hover-bg);color:var(--text-primary)}
        .btn-secondary:hover{background:var(--border)}
        .btn-sm{padding:5px 10px;font-size:12px}

        .call-bar{display:flex;align-items:center;gap:10px;padding:12px 14px}
        .call-bar-dp{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--border)}
        .call-bar-info{flex:1;min-width:0}
        .call-bar-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .call-bar-status{font-size:12px;color:var(--text-light)}
        .call-bar-actions{display:flex;gap:6px}
        .call-action-btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .15s,transform .1s}
        .call-action-btn:active{transform:scale(.9)}
        .call-action-btn.voice{background:var(--primary-light);color:var(--primary)}
        .call-action-btn.voice:hover{background:var(--primary);color:#fff}
        .call-action-btn.video{background:var(--primary-light);color:var(--primary)}
        .call-action-btn.video:hover{background:var(--primary);color:#fff}

        .create-trigger{display:flex;align-items:center;gap:10px;padding:10px 14px}
        .create-trigger-dp{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--border)}
        .create-trigger-input{flex:1;background:var(--hover-bg);border:none;border-radius:20px;padding:9px 14px;font-size:14px;color:var(--text-secondary);cursor:pointer;text-align:left;font-family:'Inter',sans-serif;transition:background .15s}
        .create-trigger-input:hover{background:var(--border)}
        .create-actions{display:flex;border-top:1px solid var(--border)}
        .create-action{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-secondary);font-family:'Inter',sans-serif;transition:background .15s}
        .create-action:hover{background:var(--hover-bg)}
        .create-action i{font-size:18px}
        .create-action.live i{color:var(--danger)}
        .create-action.photo i{color:var(--success)}
        .create-action.feeling i{color:#E8A823}

        .post-header{display:flex;align-items:center;padding:10px 14px 0;gap:8px}
        .post-dp{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--border)}
        .post-meta{flex:1;min-width:0}
        .post-author{font-weight:600;font-size:14px}
        .post-time{font-size:11px;color:var(--text-light)}
        .post-delete{width:32px;height:32px;border-radius:50%;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-light);font-size:15px;transition:background .15s}
        .post-delete:hover{background:var(--hover-bg);color:var(--danger)}
        .post-body{padding:6px 14px 8px}
        .post-text{font-size:14px;line-height:1.45;word-wrap:break-word;white-space:pre-wrap}
        .post-image{width:100%;max-height:420px;object-fit:cover;margin-top:6px;border-radius:var(--radius)}
        .post-stats{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;font-size:13px;color:var(--text-light)}
        .post-stats-left{display:flex;align-items:center;gap:4px}
        .like-react-icon{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;background:var(--primary);color:#fff;border-radius:50%;font-size:9px}
        .post-actions-row{display:flex;border-top:1px solid var(--border);margin:0 10px;padding:2px 0}
        .post-action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 0;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-secondary);font-family:'Inter',sans-serif;border-radius:6px;transition:background .15s,color .15s}
        .post-action-btn:hover{background:var(--hover-bg)}
        .post-action-btn.liked{color:var(--primary)}
        .post-action-btn i{font-size:17px}

        .comments-wrap{padding:0 14px 6px}
        .comment{display:flex;gap:7px;margin-top:6px}
        .comment-dp{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--border)}
        .comment-bubble{background:var(--hover-bg);border-radius:16px;padding:7px 11px;max-width:calc(100% - 42px)}
        .comment-author{font-weight:600;font-size:13px}
        .comment-text{font-size:13px;line-height:1.4}
        .comment-footer{display:flex;align-items:center;gap:8px;margin-top:2px;padding-left:4px}
        .comment-footer span{font-size:11px;color:var(--text-light)}
        .comment-footer button{font-size:11px;font-weight:600;color:var(--text-light);background:none;border:none;cursor:pointer;padding:0}
        .comment-footer button:hover{color:var(--primary)}
        .comment-footer .del-btn:hover{color:var(--danger)}
        .comment-input-row{display:flex;align-items:center;gap:7px;padding:6px 14px 10px;border-top:1px solid var(--border)}
        .comment-input-dp{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--border)}
        .comment-input-field{flex:1;background:var(--hover-bg);border:1px solid var(--border);border-radius:18px;padding:7px 12px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text-primary);outline:none;transition:border-color .15s}
        .comment-input-field:focus{border-color:var(--primary)}
        .comment-send{width:32px;height:32px;border-radius:50%;border:none;background:var(--primary);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .15s,transform .1s;flex-shrink:0}
        .comment-send:active{transform:scale(.88)}

        .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:16px}
        .modal-backdrop.open{display:flex}
        .modal-card{background:var(--card);border-radius:var(--radius-lg);width:100%;max-width:460px;box-shadow:var(--shadow-lg);animation:modalIn .2s ease;max-height:90vh;overflow-y:auto}
        @keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
        .modal-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
        .modal-head h3{font-size:18px;font-weight:700}
        .modal-close{width:34px;height:34px;border-radius:50%;border:none;background:var(--hover-bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-secondary);transition:background .15s}
        .modal-close:hover{background:var(--border)}
        .modal-body{padding:16px}
        .form-group{margin-bottom:14px}
        .form-label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:5px}
        .form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text-primary);outline:none;transition:border-color .15s,box-shadow .15s}
        .form-input:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
        .form-textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text-primary);outline:none;resize:vertical;min-height:80px;transition:border-color .15s,box-shadow .15s}
        .form-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-light)}
        .file-label{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px dashed var(--border);border-radius:6px;cursor:pointer;color:var(--text-secondary);font-size:13px;transition:all .15s}
        .file-label:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
        .file-label input{display:none}
        .img-preview{position:relative;margin-top:8px;display:none}
        .img-preview.show{display:block}
        .img-preview img{max-width:100%;max-height:180px;border-radius:var(--radius);object-fit:contain}
        .img-preview-remove{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
        .modal-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

        .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--bg)}
        .login-card{background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:28px 22px;width:100%;max-width:380px;text-align:center}
        .login-brand{font-family:'Sacramento',cursive;font-size:48px;color:var(--primary);line-height:1.1}
        .login-tagline{color:var(--text-secondary);font-size:14px;margin:4px 0 22px}
        .login-card .form-input{margin-bottom:10px}

        .call-overlay{display:none;position:fixed;inset:0;background:linear-gradient(170deg,#0d1b2a 0%,#1b2838 40%,#1a3a5c 100%);z-index:300;flex-direction:column;align-items:center;justify-content:center;color:#fff}
        .call-overlay.open{display:flex}
        .call-overlay-dp{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.25);background:#2a3a4a}
        .call-overlay-name{font-size:22px;font-weight:700;margin-top:14px}
        .call-overlay-status{font-size:13px;color:rgba(255,255,255,.6);margin-top:3px}
        .call-overlay-timer{font-size:20px;margin-top:6px;font-variant-numeric:tabular-nums;letter-spacing:1px}
        #remoteAudio{position:absolute;width:0;height:0;overflow:hidden;pointer-events:none;opacity:0}
        .call-videos-row{display:none;gap:6px;margin:20px 0;width:92%;max-width:500px}
        .call-videos-row.show{display:flex}
        .call-videos-row video{flex:1;border-radius:10px;background:rgba(0,0,0,.35);max-height:260px;object-fit:cover;min-height:120px}
        .call-controls{display:flex;gap:14px;margin-top:30px;align-items:center}
        .call-ctrl{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;transition:transform .12s,background .15s}
        .call-ctrl:active{transform:scale(.88)}
        .call-ctrl.off{background:rgba(255,255,255,.18)}
        .call-ctrl.off:hover{background:rgba(255,255,255,.28)}
        .call-ctrl.on{background:#fff;color:var(--text-primary)}
        .call-ctrl.end{background:var(--danger);width:60px;height:60px;font-size:24px}
        .call-ctrl.end:hover{background:#c4182f}

        .incoming-overlay{display:none;position:fixed;inset:0;background:linear-gradient(170deg,#0d1b2a 0%,#1b2838 40%,#1a3a5c 100%);z-index:350;flex-direction:column;align-items:center;justify-content:center;color:#fff}
        .incoming-overlay.open{display:flex}
        .incoming-dp{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.25);animation:callPulse 2s infinite ease-out;background:#2a3a4a}
        @keyframes callPulse{0%{box-shadow:0 0 0 0 rgba(24,119,242,.5)}70%{box-shadow:0 0 0 24px rgba(24,119,242,0)}100%{box-shadow:0 0 0 0 rgba(24,119,242,0)}}
        .incoming-name{font-size:22px;font-weight:700;margin-top:14px}
        .incoming-type{font-size:13px;color:rgba(255,255,255,.6);margin-top:3px}
        .incoming-btns{display:flex;gap:56px;margin-top:48px}
        .incoming-btn-col{display:flex;flex-direction:column;align-items:center;gap:8px}
        .incoming-btn{width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;transition:transform .12s}
        .incoming-btn:active{transform:scale(.9)}
        .incoming-btn.accept{background:var(--success)}
        .incoming-btn.reject{background:var(--danger)}
        .incoming-btn-col span{font-size:12px;color:rgba(255,255,255,.6)}

        .toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:500;pointer-events:none}
        .toast{background:var(--text-primary);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:var(--shadow-lg);animation:toastIn .25s ease;white-space:nowrap}
        @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

        .empty-state{text-align:center;padding:32px 16px;color:var(--text-light)}
        .empty-state i{font-size:36px;margin-bottom:8px;display:block;color:var(--border)}
        .empty-state p{font-size:14px}

        @media(max-width:480px){
            .header-brand{font-size:26px}
            .profile-name{font-size:18px}
            .call-overlay-name,.incoming-name{font-size:20px}
            .call-videos-row{flex-direction:column}
            .call-videos-row video{max-height:200px}
            .incoming-btns{gap:40px}
        }
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>

<div id="loginPage" class="login-page">
    <div class="login-card">
        <div class="login-brand">Mangoes Book</div>
        <p class="login-tagline">Connect with your favourite mango</p>
        <form id="loginForm">
            <input type="text" id="loginUsername" class="form-input" placeholder="Username" autocomplete="username" required>
            <input type="password" id="loginPassword" class="form-input" placeholder="Password" autocomplete="current-password" required>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:11px;font-size:15px;margin-top:6px">Log In</button>
        </form>
    </div>
</div>

<div id="mainApp" style="display:none">
    <header class="header">
        <div class="header-brand">Mangoes Book</div>
        <div class="header-right">
            <button class="icon-btn" id="headerLogout" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>
    <main class="app-wrap">
        <div class="card" id="profileCard">
            <div class="profile-cover"></div>
            <div class="profile-body">
                <img id="profileDp" class="profile-dp" alt="Profile">
                <div class="profile-name" id="profileName"></div>
                <div class="profile-bio" id="profileBio"></div>
                <div class="profile-btns">
                    <button class="btn btn-primary btn-sm" id="editProfileBtn"><i class="fas fa-pen" style="font-size:11px"></i> Edit Profile</button>
                    <button class="btn btn-secondary btn-sm" id="clearDataBtn"><i class="fas fa-trash-alt" style="font-size:11px"></i> Clear Data</button>
                </div>
            </div>
        </div>
        <div class="card" id="callBar">
            <div class="call-bar">
                <img id="callBarDp" class="call-bar-dp" alt="">
                <div class="call-bar-info">
                    <div class="call-bar-name" id="callBarName"></div>
                    <div class="call-bar-status">Tap to call</div>
                </div>
                <div class="call-bar-actions">
                    <button class="call-action-btn voice" id="voiceCallBtn" title="Voice Call"><i class="fas fa-phone"></i></button>
                    <button class="call-action-btn video" id="videoCallBtn" title="Video Call"><i class="fas fa-video"></i></button>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="create-trigger">
                <img id="createDp" class="create-trigger-dp" alt="">
                <div class="create-trigger-input" id="openPostModal">What's on your mind?</div>
            </div>
            <div class="create-actions">
                <button class="create-action live" id="liveBtn"><i class="fas fa-video"></i> Live</button>
                <button class="create-action photo" id="openPostPhoto"><i class="fas fa-image"></i> Photo</button>
                <button class="create-action feeling" id="feelingBtn"><i class="fas fa-smile"></i> Feeling</button>
            </div>
        </div>
        <div id="feedContainer"></div>
    </main>
</div>

<div class="modal-backdrop" id="postModal">
    <div class="modal-card">
        <div class="modal-head"><h3>Create Post</h3><button class="modal-close" id="closePostModal"><i class="fas fa-times"></i></button></div>
        <div class="modal-body">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
                <img id="postModalDp" style="width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--border)" alt="">
                <span id="postModalName" style="font-weight:600;font-size:14px"></span>
            </div>
            <textarea id="postTextarea" class="form-textarea" placeholder="What's on your mind?" rows="3" style="min-height:90px;border:none;background:transparent;padding:0;font-size:16px;resize:none"></textarea>
            <div class="img-preview" id="postImgPreview"><img id="postImgPreviewImg" alt="Preview"><button class="img-preview-remove" id="removePostImg"><i class="fas fa-times"></i></button></div>
            <div style="margin-top:10px"><label class="file-label"><i class="fas fa-image"></i> Add Photo <input type="file" id="postFileInput" accept="image/*"></label></div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary btn-sm" id="cancelPost">Cancel</button><button class="btn btn-primary btn-sm" id="submitPost">Post</button></div>
    </div>
</div>

<div class="modal-backdrop" id="editModal">
    <div class="modal-card">
        <div class="modal-head"><h3>Edit Profile</h3><button class="modal-close" id="closeEditModal"><i class="fas fa-times"></i></button></div>
        <div class="modal-body">
            <div class="form-group"><label class="form-label">Username</label><input type="text" id="editName" class="form-input" placeholder="Your name"></div>
            <div class="form-group"><label class="form-label">Bio</label><textarea id="editBio" class="form-textarea" placeholder="Tell something about yourself"></textarea></div>
            <div class="form-group"><label class="file-label"><i class="fas fa-camera"></i> Change Profile Photo <input type="file" id="editDpInput" accept="image/*"></label></div>
            <div class="img-preview" id="editDpPreview"><img id="editDpPreviewImg" alt="Preview"><button class="img-preview-remove" id="removeEditDp"><i class="fas fa-times"></i></button></div>
        </div>
        <div class="modal-footer"><button class="btn btn-secondary btn-sm" id="cancelEdit">Cancel</button><button class="btn btn-primary btn-sm" id="saveEdit">Save</button></div>
    </div>
</div>

<div class="incoming-overlay" id="incomingOverlay">
    <img id="incomingDp" class="incoming-dp" alt="">
    <div class="incoming-name" id="incomingName"></div>
    <div class="incoming-type" id="incomingType"></div>
    <div class="incoming-btns">
        <div class="incoming-btn-col"><button class="incoming-btn reject" id="rejectCallBtn"><i class="fas fa-phone-slash"></i></button><span>Decline</span></div>
        <div class="incoming-btn-col"><button class="incoming-btn accept" id="acceptCallBtn"><i class="fas fa-phone"></i></button><span>Accept</span></div>
    </div>
</div>

<div class="call-overlay" id="callOverlay">
    <img id="callOverlayDp" class="call-overlay-dp" alt="">
    <div class="call-overlay-name" id="callOverlayName"></div>

end" data-post-id="${post.id}"><i class="fas fa-paper-plane"></i></button></div>`;

    /* ===== SUBSCRIPTIONS ===== */
    function subscribeUpdates(){
        if(updatesChannel)db.removeChannel(updatesChannel);
        updatesChannel=db.channel('updates-ch')
            .on('postgres_changes',{event:'*',schema:'public',table:'posts'},()=>loadFeed())
            .on('postgres_changes',{event:'*',schema:'public',table:'comments'},()=>loadFeed())
            .on('postgres_changes',{event:'*',schema:'public',table:'likes'},()=>loadFeed())
            .subscribe(s=>{if(s==='CHANNEL_ERROR'||s==='TIMED_OUT'){setTimeout(()=>{subscribeUpdates();retryDelayUp=Math.min(retryDelayUp*2,30000)},retryDelayUp)}else if(s==='SUBSCRIBED'){retryDelayUp=2000}});
    }
    function subscribeCalls(){
        if(callsChannel)db.removeChannel(callsChannel);
        callsChannel=db.channel('calls-ch')
            .on('postgres_changes',{event:'INSERT',schema:'public',table:'calls',filter:`receiver_id=eq.${currentUser.id}`},p=>handleCallSignal(p.new))
            .subscribe(s=>{if(s==='CHANNEL_ERROR'||s==='TIMED_OUT'){setTimeout(()=>{subscribeCalls();retryDelayCall=Math.min(retryDelayCall*2,30000)},retryDelayCall)}else if(s==='SUBSCRIBED'){retryDelayCall=2000}});
    }

    /* ===== POLLING FALLBACK — checks every 2s for any missed signals ===== */
    async function pollCallSignals(){
        if(!currentUser)return;
        try{
            const{data,error}=await db.from('calls').select('*').eq('receiver_id',currentUser.id).order('created_at',{ascending:true});
            if(error||!data)return;
            data.forEach(call=>{if(!processedCallIds.has(call.id)){processedCallIds.add(call.id);handleCallSignal(call)}});
        }catch(e){}
    }

    /* ===== CALL SIGNAL HANDLER ===== */
    async function handleCallSignal(call){
        const type=call.type;
        console.log('Signal received:',type,'id:',call.id);

        if(type==='offer'){
            if(callState!=='idle')return; // Already in a call
            pendingOffer=call;
            showIncomingCall(call.sender_id,checkOfferIsVideo(call.data));
        }else if(type==='answer'&&peerConnection){
            const answer=parseSDP(call.data);
            if(answer){
                try{
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                    console.log('Remote description (answer) set successfully');
                    drainIceQueue();
                }catch(e){console.error('Set remote desc error:',e)}
            }
        }else if(type==='ice-candidate'&&peerConnection){
            const candidate=parseCandidate(call.data);
            if(candidate)queueOrAddIce(candidate);
        }else if(type==='reject'){
            toast('Call was declined');endCall();
        }else if(type==='cancel'){
            stopRingtone();document.getElementById('incomingOverlay').classList.remove('open');pendingOffer=null;toast('Call cancelled');
        }else if(type==='end'){
            endCall();
        }
    }

    /* ===== ICE QUEUE ===== */
    async function queueOrAddIce(candidate){
        if(peerConnection&&peerConnection.remoteDescription&&peerConnection.remoteDescription.type){
            try{await peerConnection.addIceCandidate(new RTCIceCandidate(candidate))}catch(e){console.warn('ICE add err:',e)}
        }else{iceQueue.push(candidate)}
    }
    async function drainIceQueue(){
        while(iceQueue.length>0){const c=iceQueue.shift();try{await peerConnection.addIceCandidate(new RTCIceCandidate(c))}catch(e){console.warn('ICE drain err:',e)}}
    }

    /* ===== INCOMING CALL UI ===== */
    function showIncomingCall(senderId,isVideo){
        if(callState!=='idle')return;
        const sender=USERS.find(u=>u.id===senderId);
        document.getElementById('incomingDp').src=getDp(sender);document.getElementById('incomingDp').onerror=function(){imgFall(this)};
        document.getElementById('incomingName').textContent=sender?.username||'Unknown';
        document.getElementById('incomingType').textContent=isVideo?'Video Call':'Voice Call';
        document.getElementById('incomingOverlay').classList.add('open');
        startRingtone();
    }

    document.getElementById('acceptCallBtn').addEventListener('click',async()=>{
        stopRingtone();document.getElementById('incomingOverlay').classList.remove('open');
        if(!pendingOffer)return;
        try{await handleAcceptCall(pendingOffer)}catch(e){console.error('Accept error:',e);toast('Call failed: '+e.message);endCall()}
    });
    document.getElementById('rejectCallBtn').addEventListener('click',async()=>{
        stopRingtone();document.getElementById('incomingOverlay').classList.remove('open');
        if(pendingOffer){
            const{error}=await db.from('calls').insert({sender_id:currentUser.id,receiver_id:pendingOffer.sender_id,type:'reject',data:'{}'});
            if(error)console.error('Reject send error:',error);
            await db.from('calls').delete().eq('id',pendingOffer.id);
        }
        pendingOffer=null;
    });

    async function handleAcceptCall(call){
        const offer=parseSDP(call.data);
        if(!offer)throw new Error('Invalid offer data');
        currentCallIsVideo=checkOfferIsVideo(call.data);

        const mediaOk=await acquireMedia(currentCallIsVideo);
        if(!mediaOk)throw new Error('Microphone/Camera access denied');

        peerConnection=new RTCPeerConnection(RTC_CONFIG);
        /* Add local tracks BEFORE creating answer so SDP includes sendrecv */
        localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream));
        setupPeerConnection(call.sender_id);

        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        drainIceQueue();

        const answer=await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        /* Send answer with error check */
        const{error:ansErr}=await db.from('calls').insert({sender_id:currentUser.id,receiver_id:call.sender_id,type:'answer',data:JSON.stringify(answer)});
        if(ansErr){console.error('Answer send error:',ansErr);throw new Error('Failed to send answer: '+ansErr.message)}
        console.log('Answer sent to DB successfully');

        /* Delete the offer record */
        await db.from('calls').delete().eq('id',call.id);

        /* Show "Connecting..." — NOT "Connected". Wait for onconnectionstatechange */
        callState='connecting';
        showCallOverlay(call.sender_id,'Connecting...');
        pendingOffer=null;
    }

    /* ===== OUTGOING CALL ===== */
    document.getElementById('voiceCallBtn').addEventListener('click',()=>initiateCall(false));
    document.getElementById('videoCallBtn').addEventListener('click',()=>initiateCall(true));

    async function initiateCall(isVideo){
        if(callState!=='idle'){toast('Already in a call');return}
        currentCallIsVideo=isVideo;
        const mediaOk=await acquireMedia(isVideo);
        if(!mediaOk)return;

        peerConnection=new RTCPeerConnection(RTC_CONFIG);
        localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream));
        setupPeerConnection(otherUser.id);

        const offer=await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        /* Send offer with error check */
        const{error:offErr}=await db.from('calls').insert({sender_id:currentUser.id,receiver_id:otherUser.id,type:'offer',data:JSON.stringify(offer)});
        if(offErr){console.error('Offer send error:',offErr);toast('Call failed: '+offErr.message);endCall();return}
        console.log('Offer sent to DB successfully');

        callState='calling';
        showCallOverlay(otherUser.id,'Calling...');
        startCallTimeout();
    }

    /* ===== PEER CONNECTION SETUP ===== */
    function setupPeerConnection(partnerId){
        const remoteAudio=document.getElementById('remoteAudio');
        const remoteVideo=document.getElementById('remoteVideo');

        /* ontrack: use the native stream from the WebRTC event */
        peerConnection.ontrack=e=>{
            console.log('ontrack:',e.track.kind,'streams:',e.streams.length);
            const stream=(e.streams&&e.streams.length>0)?e.streams[0]:null;
            if(stream){
                remoteVideo.srcObject=stream;
                remoteAudio.srcObject=stream;
                remoteVideo.play().then(()=>console.log('remoteVideo playing')).catch(()=>{setTimeout(()=>remoteVideo.play().catch(()=>{}),800)});
                remoteAudio.play().then(()=>console.log('remoteAudio playing')).catch(()=>{setTimeout(()=>remoteAudio.play().catch(()=>{}),800)});
            }else{
                let ex=remoteVideo.srcObject;
                if(!ex){ex=new MediaStream();remoteVideo.srcObject=ex;remoteAudio.srcObject=ex}
                ex.addTrack(e.track);
                remoteVideo.play().catch(()=>{});
                remoteAudio.play().catch(()=>{});
            }
        };

        peerConnection.onicecandidate=e=>{
            if(e.candidate){
                db.from('calls').insert({sender_id:currentUser.id,receiver_id:partnerId,type:'ice-candidate',data:JSON.stringify(e.candidate)}).then(({error})=>{if(error)console.error('ICE insert error:',error)});
            }
        };

        /* THIS is the only place where callState becomes 'connected' */
        peerConnection.onconnectionstatechange=()=>{
            const s=peerConnection.connectionState;
            console.log('Connection state:',s);
            if(s==='connected'){
                callState='connected';
                clearCallTimeout();
                document.getElementById('callOverlayStatus').style.display='none';
                startCallTimer();
                /* Force play */
                if(remoteVideo.srcObject)remoteVideo.play().catch(()=>{});
                if(remoteAudio.srcObject)remoteAudio.play().catch(()=>{});
                toast('Connected');
            }else if(s==='disconnected'){
                toast('Connection unstable...');
            }else if(s==='failed'){
                toast('Connection failed');endCall();
            }
        };

        /* Periodic media play check for mobile autoplay restrictions */
        if(mediaCheckInterval)clearInterval(mediaCheckInterval);
        mediaCheckInterval=setInterval(()=>{
            if(callState==='idle'){clearInterval(mediaCheckInterval);mediaCheckInterval=null;return}
            if(remoteVideo.srcObject&&remoteVideo.paused)remoteVideo.play().catch(()=>{});
            if(remoteAudio.srcObject&&remoteAudio.paused)remoteAudio.play().catch(()=>{});
        },2000);
    }

    /* ===== CALL OVERLAY ===== */
    function showCallOverlay(partnerId,statusText){
        const partner=USERS.find(u=>u.id===partnerId);
        document.getElementById('callOverlayDp').src=getDp(partner);document.getElementById('callOverlayDp').onerror=function(){imgFall(this)};
        document.getElementById('callOverlayName').textContent=partner?.username||'Unknown';
        document.getElementById('callOverlayStatus').textContent=statusText;
        document.getElementById('callOverlayStatus').style.display='block';
        document.getElementById('callOverlayTimer').style.display='none';

        const videoRow=document.getElementById('callVideosRow');
        const remoteAudio=document.getElementById('remoteAudio');

        if(currentCallIsVideo){
            videoRow.classList.add('show');
            document.getElementById('localVideo').srcObject=localStream;
            document.getElementById('callOverlayDp').style.display='none';
            document.getElementById('cameraBtn').style.display='flex';
            remoteAudio.muted=true; // Video element handles audio
        }else{
            videoRow.classList.remove('show');
            document.getElementById('callOverlayDp').style.display='block';
            document.getElementById('cameraBtn').style.display='none';
            remoteAudio.muted=false; // Audio element handles voice
        }

        isMuted=false;isCameraOff=false;isSpeakerOn=false;
        document.getElementById('muteBtn').className='call-ctrl off';document.getElementById('muteBtn').innerHTML='<i class="fas fa-microphone"></i>';
        document.getElementById('cameraBtn').className='call-ctrl off';document.getElementById('cameraBtn').innerHTML='<i class="fas fa-video"></i>';
        document.getElementById('speakerBtn').className='call-ctrl off';document.getElementById('speakerBtn').innerHTML='<i class="fas fa-volume-up"></i>';

        document.getElementById('callOverlay').classList.add('open');
        /* Prime media elements during user gesture */
        try{document.getElementById('remoteVideo').play()}catch(e){}
        try{document.getElementById('remoteAudio').play()}catch(e){}
    }

    function startCallTimer(){
        callStartTime=Date.now();
        document.getElementById('callOverlayTimer').style.display='block';
        document.getElementById('callOverlayStatus').style.display='none';
        callTimerInterval=setInterval(()=>{const e=Math.floor((Date.now()-callStartTime)/1000);document.getElementById('callOverlayTimer').textContent=fmtElapsed(e)},1000);
    }
    function startCallTimeout(){clearCallTimeout();callTimeout=setTimeout(()=>{if(callState==='calling'||callState==='connecting'){toast('Call not answered');db.from('calls').insert({sender_id:currentUser.id,receiver_id:otherUser.id,type:'cancel',data:'{}'});endCall()}},30000)}
    function clearCallTimeout(){if(callTimeout){clearTimeout(callTimeout);callTimeout=null}}

    /* ===== END CALL ===== */
    document.getElementById('endCallBtn').addEventListener('click',()=>{
        if(callState!=='idle'&&otherUser)db.from('calls').insert({sender_id:currentUser.id,receiver_id:otherUser.id,type:'end',data:'{}'});
        endCall();
    });

    function endCall(){
        callState='idle';clearCallTimeout();stopRingtone();
        if(mediaCheckInterval){clearInterval(mediaCheckInterval);mediaCheckInterval=null}
        if(callTimerInterval){clearInterval(callTimerInterval);callTimerInterval=null}
        if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null}
        if(peerConnection){peerConnection.close();peerConnection=null}
        iceQueue=[];pendingOffer=null;

        const ra=document.getElementById('remoteAudio'),rv=document.getElementById('remoteVideo'),lv=document.getElementById('localVideo');
        ra.pause();ra.srcObject=null;ra.muted=false;
        rv.pause();rv.srcObject=null;
        lv.pause();lv.srcObject=null;

        document.getElementById('callOverlay').classList.remove('open');
        document.getElementById('incomingOverlay').classList.remove('open');
        document.getElementById('callOverlayStatus').style.display='block';
        cleanupCallRecords();
    }

    async function cleanupCallRecords(){
        try{await db.from('calls').delete().eq('sender_id',currentUser.id);await db.from('calls').delete().eq('receiver_id',currentUser.id)}catch(e){}
    }

    /* ===== MEDIA ===== */
    async function acquireMedia(isVideo){
        try{
            localStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true},video:isVideo?{facingMode:'user',width:{ideal:640},height:{ideal:480}}:false});
            return true;
        }catch(e){
            console.error('Media error:',e);
            if(e.name==='NotFoundError')toast('No microphone/camera found');
            else if(e.name==='NotAllowedError')toast('Permission denied for mic/camera');
            else toast('Media error: '+e.message);
            return false;
        }
    }

    /* ===== CALL CONTROLS ===== */
    document.getElementById('muteBtn').addEventListener('click',()=>{
        isMuted=!isMuted;if(localStream)localStream.getAudioTracks().forEach(t=>{t.enabled=!isMuted});
        const b=document.getElementById('muteBtn');b.className=isMuted?'call-ctrl on':'call-ctrl off';b.innerHTML=isMuted?'<i class="fas fa-microphone-slash"></i>':'<i class="fas fa-microphone"></i>';
    });
    document.getElementById('speakerBtn').addEventListener('click',()=>{
        isSpeakerOn=!isSpeakerOn;
        const b=document.getElementById('speakerBtn');b.className=isSpeakerOn?'call-ctrl on':'call-ctrl off';b.innerHTML=isSpeakerOn?'<i class="fas fa-volume-up"></i>':'<i class="fas fa-volume-mute"></i>';
        document.getElementById('remoteAudio').volume=isSpeakerOn?1:.3;document.getElementById('remoteVideo').volume=isSpeakerOn?1:.3;
    });
    document.getElementById('cameraBtn').addEventListener('click',()=>{
        isCameraOff=!isCameraOff;if(localStream)localStream.getVideoTracks().forEach(t=>{t.enabled=!isCameraOff});
        const b=document.getElementById('cameraBtn');b.className=isCameraOff?'call-ctrl on':'call-ctrl off';b.innerHTML=isCameraOff?'<i class="fas fa-video-slash"></i>':'<i class="fas fa-video"></i>';
    });
</script>
